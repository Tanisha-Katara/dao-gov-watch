name: Backfill DAO Forums

on:
  workflow_dispatch:
    inputs:
      days:
        description: Backfill window in days
        required: true
        default: "30"

concurrency:
  group: backfill
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run historical backfill
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python monitor_governance_posts.py --mode backfill --days "${{ github.event.inputs.days }}"

      - name: Render dashboard
        run: python render_dashboard.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "dao-gov-watch bot"
          git add state.json opportunities.json dashboard.html
          if ! git diff --staged --quiet; then
            git commit -m "historical backfill ${DAYS}d $(date -u +'%Y-%m-%dT%H:%MZ')"
            for attempt in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase -Xtheirs origin master && git push; then
                exit 0
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep 2
            done
            echo "push failed after 3 attempts" >&2
            exit 1
          else
            echo "No changes to commit"
          fi
        env:
          DAYS: ${{ github.event.inputs.days }}
