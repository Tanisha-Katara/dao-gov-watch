name: Discover DAO Forums

on:
  schedule:
    - cron: '0 1 * * 1'  # Every Monday at 01:00 UTC
  workflow_dispatch:

concurrency:
  group: discover-forums
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Discover candidate forums
        run: python discover_forum_candidates.py

      - name: Commit discovery artifacts
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "dao-gov-watch bot"
          git add forum_candidates.json forum_candidates.md
          if ! git diff --staged --quiet; then
            git commit -m "refresh forum discovery $(date -u +'%Y-%m-%dT%H:%MZ')"
            for attempt in 1 2 3; do
              git rebase --abort 2>/dev/null || true
              if git pull --rebase -Xtheirs origin master && git push; then
                exit 0
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep 2
            done
            echo "push failed after 3 attempts" >&2
            exit 1
          else
            echo "No discovery changes to commit"
          fi
