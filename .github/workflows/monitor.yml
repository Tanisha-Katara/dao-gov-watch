name: Monitor DAO Forums

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'dashboard.html'
      - 'opportunities.json'
      - 'state.json'

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll forums and classify
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python monitor_governance_posts.py

      - name: Render dashboard
        run: python render_dashboard.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "dao-gov-watch bot"
          git add state.json opportunities.json dashboard.html
          if ! git diff --staged --quiet; then
            git commit -m "auto-update $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          else
            echo "No changes to commit"
          fi
