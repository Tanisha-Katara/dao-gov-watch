name: Monitor DAO Forums (Live)

on:
  schedule:
    - cron: '0 0 * * *'  # Every 24 hours
  workflow_dispatch:
  push:
    branches:
      - master
    paths-ignore:
      - 'dashboard.html'
      - 'opportunities.json'
      - 'state.json'
      - 'forum_candidates.json'
      - 'forum_candidates.md'

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll forums and classify (live)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python monitor_governance_posts.py

      - name: Render dashboard
        run: python render_dashboard.py

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "dao-gov-watch bot"
          git add state.json opportunities.json dashboard.html
          if ! git diff --staged --quiet; then
            git commit -m "auto-update $(date -u +'%Y-%m-%dT%H:%MZ')"
            # Rebase on any commits that landed while this job ran so the push
            # survives races with other scheduled runs.
            for attempt in 1 2 3; do
              # Clear any in-progress rebase from a prior attempt.
              git rebase --abort 2>/dev/null || true
              # -Xtheirs during pull-rebase means "prefer the commit being
              # replayed" (our just-committed changes). Git flips ours/theirs
              # semantics during rebase vs merge; see git-rebase(1). Safe for
              # dashboard.html (regenerated each run), state.json (max-id), and
              # opportunities.json (URL-keyed dedup).
              if git pull --rebase -Xtheirs origin master && git push; then
                exit 0
              fi
              echo "push attempt $attempt failed, retrying..."
              sleep 2
            done
            echo "push failed after 3 attempts" >&2
            exit 1
          else
            echo "No changes to commit"
          fi
